# crowdin.yml
"project_id": "YOUR_CROWDIN_PROJECT_ID"
"api_token_env": "CROWDIN_PERSONAL_TOKEN" # ดึง Token จาก GitHub Secrets
"base_path": "."
"base_url": "https://api.crowdin.com"

"preserve_hierarchy": true

"files": [
  {
    # 1. ระบุตำแหน่งไฟล์ภาษาต้นฉบับ (ภาษาอังกฤษ)
    "source": "/OpenUtau/Strings/Strings.en-US.axaml",
    
    # 2. ระบุรูปแบบชื่อไฟล์เมื่อนักแปล (หรือคุณ) แปลภาษาไทยเสร็จแล้วให้โปรแกรมดึงกลับมา
    # %two_letters_code% จะเปลี่ยนเป็น th อัตโนมัติ (เช่น Strings.th-TH.axaml)
    "translation": "/OpenUtau/Strings/Strings.%osx_locale%.axaml",
    
    # 3. กำหนดให้ Crowdin รู้ว่าไฟล์ต้นฉบับคือภาษาอังกฤษ
    "languages_mapping": {
      "osx_locale": {
        "th": "th-TH",
        "en": "en-US"
      }
    }
  }
]

name: THAI CVVC-VCCV Build

on:
  # อนุญาตให้กดรัน Workflow นี้ได้ด้วยตัวเองผ่านหน้าเว็บ GitHub Actions
  workflow_dispatch: {}
  
  # (ตัวเลือกเสริม) ถ้าอยากให้รันอัตโนมัติทุกครั้งที่อัปเดตโค้ดขึ้น branch main ให้เอาคอมเมนต์ด้านล่างออกครับ
  # push:
  #   branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # ใช้ Windows ในการ Build เพื่อความเข้ากันได้กับ OpenUtau

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x' # ระบุเวอร์ชัน .NET (ปรับตามไฟล์ .csproj ของคุณ)

    - name: Build Phonemizer Plugin
      # สั่ง Compile โค้ดแบบ Release เพื่อให้ได้ไฟล์ที่เบาและทำงานเร็วที่สุด
      run: dotnet build -c Release

    - name: Upload Plugin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: THAI-CVVC-VCCV-Plugin
        # ระบุ Path ไปหาไฟล์ .dll ที่สร้างเสร็จแล้ว (ปรับพาธให้ตรงกับโครงสร้างโฟลเดอร์ของคุณ)
        path: bin/Release/net6.0/OpenUtau.Plugin.Builtin.dll
